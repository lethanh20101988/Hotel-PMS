server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Docker embedded DNS — resolve `backend` khi có request, không phải lúc nginx start.
  # Tránh [emerg] host not found in upstream "backend" khi chỉ bật frontend trước backend.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # State realtime WebSocket
  location /ws/state {
    set $backend_upstream http://backend:4000;
    proxy_pass $backend_upstream$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
  }

  # Backend API (biến + $request_uri để buộc resolve runtime)
  location /api/ {
    set $backend_upstream http://backend:4000;
    proxy_pass $backend_upstream$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Client-Id $http_x_client_id;
    client_max_body_size 200m;
  }

  # Auth API aliases requested by product spec (without /api prefix)
  location ~ ^/(send-otp|verify-otp|register|create-qr-session|scan-qr)$ {
    set $backend_upstream http://backend:4000;
    proxy_pass $backend_upstream$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Client-Id $http_x_client_id;
    client_max_body_size 10m;
  }

  # QR login WebSocket
  location /ws/qr {
    set $backend_upstream http://backend:4000;
    proxy_pass $backend_upstream$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 130s;
  }
}
